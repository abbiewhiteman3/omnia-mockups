<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Omnia Marketing — Mockups</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: #FAF7F2;
      color: #2A2826;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      font-weight: 300;
    }
    .wrap { max-width: 720px; width: 100%; }
    .brand {
      font-family: 'DM Serif Display', serif;
      font-size: 34px;
      letter-spacing: -0.01em;
      margin-bottom: 6px;
    }
    .tagline {
      font-size: 13px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: #8A847E;
      margin-bottom: 56px;
    }
    .list {
      display: grid;
      gap: 16px;
    }
    .item {
      display: block;
      padding: 28px 32px;
      background: #fff;
      border: 1px solid #E8E2D6;
      text-decoration: none;
      color: inherit;
      transition: transform 200ms, border-color 200ms;
    }
    .item:hover { transform: translateY(-2px); border-color: #2A2826; }
    .item h2 {
      font-family: 'DM Serif Display', serif;
      font-size: 24px;
      margin-bottom: 4px;
    }
    .item p {
      font-size: 14px;
      color: #6B5F55;
    }
    .item .arrow {
      font-family: 'DM Serif Display', serif;
      font-size: 22px;
      float: right;
      margin-top: -32px;
    }
    footer {
      margin-top: 48px;
      font-size: 12px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #A29A92;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="brand">Omnia Marketing</div>
    <div class="tagline">Prospect mockups</div>
    <div class="list">
      <a href="kenzie-brows/" class="item">
        <span class="arrow">&rarr;</span>
        <h2>Kenzie Brows</h2>
        <p>Personal site rebuild — kenziebrows.com</p>
      </a>
      <a href="velvet-rose/" class="item">
        <span class="arrow">&rarr;</span>
        <h2>Velvet Rose Beauty Collective</h2>
        <p>Studio site rebuild — velvetroseslc.com</p>
      </a>
      <a href="bold-beauty/" class="item">
        <span class="arrow">&rarr;</span>
        <h2>B0ld Beauty by Tay Chanel</h2>
        <p>One-page site mockup — Lawrenceville, GA</p>
      </a>
    </div>
    <footer>Private &middot; Not indexed</footer>
  </div>
</body>
</html>

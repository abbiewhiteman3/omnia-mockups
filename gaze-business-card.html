<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gaze — Business Card</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@0,300;1,300;1,400&family=DM+Sans:wght@300;400&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #E8E4DF;
    font-family: 'DM Sans', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    gap: 48px;
    padding: 60px 40px;
  }

  .label {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: .22em;
    text-transform: uppercase;
    color: rgba(0,0,0,.3);
    margin-bottom: 16px;
    text-align: center;
  }

  /* Card is 3.5 x 2 inches — at 96dpi scaled for screen */
  .card {
    width: 560px;
    height: 320px;
    border-radius: 0;
    overflow: hidden;
    position: relative;
    box-shadow: 0 8px 48px rgba(0,0,0,.18), 0 2px 8px rgba(0,0,0,.1);
  }

  /* ── FRONT ── */
  .card-front {
    background: #0A0A0A;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    padding: 28px 32px;
  }

  .card-front .oversized-logo {
    position: absolute;
    top: -24px;
    left: -16px;
    right: -16px;
    pointer-events: none;
    overflow: hidden;
    height: 82%;
  }

  .card-front .oversized-logo img {
    width: 115%;
    max-width: none;
    display: block;
    opacity: .92;
    /* show just the wordmark portion, crop the bottom */
    object-fit: cover;
    object-position: center 20%;
  }

  .card-front .bottom-row {
    position: absolute;
    bottom: 24px;
    left: 32px;
    right: 32px;
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
  }

  .card-front .studio-label {
    font-family: 'DM Mono', monospace;
    font-size: 8px;
    letter-spacing: .35em;
    text-transform: uppercase;
    color: rgba(220,201,182,.4);
  }

  .card-front .tagline {
    font-family: 'Cormorant', serif;
    font-style: italic;
    font-weight: 300;
    font-size: 11px;
    color: rgba(220,201,182,.45);
    letter-spacing: .04em;
    text-align: right;
  }

  /* ── BACK ── */
  .card-back {
    background: #FAF7F4;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 36px 40px;
  }

  .card-back .artist-name {
    font-family: 'Cormorant', serif;
    font-style: italic;
    font-weight: 300;
    font-size: 34px;
    color: #0A0A0A;
    letter-spacing: .02em;
    line-height: 1;
    margin-bottom: 6px;
  }

  .card-back .artist-title {
    font-family: 'DM Mono', monospace;
    font-size: 8px;
    letter-spacing: .28em;
    text-transform: uppercase;
    color: #DCC9B6;
    margin-bottom: 24px;
  }

  .card-back .divider {
    width: 32px;
    height: 1px;
    background: #DCC9B6;
    margin-bottom: 20px;
  }

  .card-back .contact-block {
    display: flex;
    flex-direction: column;
    gap: 5px;
  }

  .card-back .contact-line {
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    font-size: 10.5px;
    color: #6B6460;
    letter-spacing: .02em;
    line-height: 1.4;
  }

  .card-back .contact-line span {
    font-family: 'DM Mono', monospace;
    font-size: 8px;
    letter-spacing: .15em;
    text-transform: uppercase;
    color: #C2B0A0;
    margin-right: 8px;
  }

  .card-back .book-cta {
    position: absolute;
    bottom: 28px;
    right: 40px;
    font-family: 'DM Mono', monospace;
    font-size: 8px;
    letter-spacing: .22em;
    text-transform: uppercase;
    color: rgba(10,10,10,.25);
  }

  /* ── ALTERNATE FRONT — light version ── */
  .card-front-light {
    background: #FAF7F4;
  }
  .card-front-light .oversized-text {
    position: absolute;
    top: -28px;
    left: -12px;
    font-family: 'Cormorant', serif;
    font-style: italic;
    font-weight: 300;
    font-size: 210px;
    color: #0A0A0A;
    letter-spacing: -.01em;
    line-height: 1;
    white-space: nowrap;
    opacity: .9;
  }
  .card-front-light .studio-label {
    color: rgba(10,10,10,.3);
  }
  .card-front-light .tagline {
    color: rgba(10,10,10,.3);
  }
</style>
</head>
<body>

<div class="label">Front — Dark Version</div>
<div class="card card-front">
  <div class="oversized-logo">
    <img
      src="https://lashtech1.omniatemplates.com/wp-content/uploads/2026/06/Black-White-Modern-Elegant-Simple-Creative-Studio-Logo-1-150x150.png"
      alt="gaze"
    >
  </div>
  <div class="bottom-row">
    <div class="studio-label">Lash Studio</div>
    <div class="tagline">Wake up effortlessly beautiful.</div>
  </div>
</div>

<div class="label">Back — Contact</div>
<div class="card card-back" style="position:relative;">
  <div class="artist-name">[Your Name]</div>
  <div class="artist-title">Certified Lash Artist</div>
  <div class="divider"></div>
  <div class="contact-block">
    <div class="contact-line"><span>Tel</span>(385) 000-0000</div>
    <div class="contact-line"><span>Email</span>hello@gazestudio.com</div>
    <div class="contact-line"><span>IG</span>@gazestudio</div>
    <div class="contact-line"><span>Web</span>gazestudio.com</div>
  </div>
  <div class="book-cta">Book online at gazestudio.com</div>
</div>

<div class="label">Front — Light Version</div>
<div class="card card-front card-front-light" style="position:relative; display:flex; flex-direction:column; justify-content:flex-end; padding:28px 32px;">
  <div class="oversized-text">gaze</div>
  <div class="bottom-row">
    <div class="studio-label" style="color:rgba(10,10,10,.3);">Lash Studio</div>
    <div class="tagline" style="color:rgba(10,10,10,.25);">Wake up effortlessly beautiful.</div>
  </div>
</div>

</body>
</html>
